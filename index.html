<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Bizzy — Web Summit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --accent:      #F30C5F;
  --accent-soft: rgba(243,12,95,.09);
  --accent-mid:  rgba(243,12,95,.20);
  --yellow:      #F5E000;
  --sf2:         #F7F5F1;
  --border:      #ECEAE3;
  --bsoft:       #F1EFE8;
  --t1: #1A1915; --t2: #57554E; --t3: #8F8C84; --t4: #B5B2A8;
  --font: 'Manrope', system-ui, sans-serif;
  --rmd: 14px; --rlg: 20px; --rchat: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: var(--font); color: var(--t1);
  background: var(--sf2);
  height: 100%; display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── App bar (sticky top) ── */
.abar {
  flex-shrink: 0;
  background: #FFF;
  border-bottom: 1px solid var(--bsoft);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 20;
}
.abar-l { display: flex; align-items: center; gap: 10px; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: var(--yellow); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo svg { width: 20px; height: 20px; }
.evname { font-size: 13px; font-weight: 700; color: var(--t1); line-height: 1.2; letter-spacing: -.2px; }
.evdate { font-size: 10.5px; font-weight: 500; color: var(--t3); }
.abar-r { display: flex; gap: 4px; align-items: center; }
.ibtn { width: 36px; height: 36px; border-radius: 50%; border: 0; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--t1); position: relative; }
.bell::after { content: ''; position: absolute; top: 7px; right: 7px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); border: 2px solid #FFF; }
.ava { width: 32px; height: 32px; border-radius: 50%; background: var(--t1); color: #FFF; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; letter-spacing: .5px; }

/* ── Anchor card (sticky below app bar) ── */
.anchor-wrap {
  flex-shrink: 0;
  background: #FFF;
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--bsoft);
  position: relative; z-index: 10;
}
.acard { background: var(--t1); border-radius: var(--rlg); padding: 13px 15px; color: #FFF; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; transition: opacity .15s; user-select: none; }
.acard:active { opacity: .88; }
.aicon { width: 40px; height: 40px; border-radius: 11px; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.abody { flex: 1; min-width: 0; }
.alabel { font-size: 9.5px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 2px; }
.amain { font-size: 14px; font-weight: 700; letter-spacing: -.3px; line-height: 1.25; }
.asub { font-size: 11px; font-weight: 500; color: rgba(255,255,255,.55); margin-top: 2px; }
.acta { background: var(--accent); border: 0; color: #FFF; font-family: var(--font); font-size: 11.5px; font-weight: 700; padding: 8px 13px; border-radius: 9px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.acta:active { background: #d40a55; }

/* ── Scrollable chat area ── */
.cs {
  flex: 1; overflow-y: auto; padding: 16px 0 8px;
  display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch;
}
.cs::-webkit-scrollbar { display: none; }

/* ── Bizzy divider ── */
.bdiv { display: flex; align-items: center; gap: 10px; padding: 0 16px 12px; flex-shrink: 0; }
.bline { flex: 1; height: 1px; background: var(--border); }
.bbadge { display: flex; align-items: center; gap: 6px; background: #FFF; border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px 5px 8px; font-size: 11px; font-weight: 700; color: var(--t2); }
.bglyph { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; }
.ldot { width: 6px; height: 6px; border-radius: 50%; background: #19C37D; display: inline-block; animation: lp 1.6s infinite; }
@keyframes lp { 0%{box-shadow:0 0 0 0 rgba(25,195,125,.55)}70%{box-shadow:0 0 0 6px rgba(25,195,125,0)}100%{box-shadow:0 0 0 0 rgba(25,195,125,0)} }
.rbtn { width: 28px; height: 28px; border-radius: 50%; border: 0; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--t3); }
.rbtn:active { background: var(--sf2); color: var(--t1); }

/* ── Messages ── */
.msgs { display: flex; flex-direction: column; gap: 4px; padding: 0 16px 4px; }
.bgreet { display: flex; align-items: flex-start; gap: 9px; padding: 0 16px 10px; }
.bav { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.gbub { background: #FFF; border: 1px solid var(--border); border-radius: 4px var(--rchat) var(--rchat) var(--rchat); padding: 10px 13px; font-size: 13.5px; font-weight: 500; color: var(--t1); line-height: 1.5; max-width: calc(100% - 40px); }
.bub-u { align-self: flex-end; background: var(--t1); color: #FFF; border-radius: var(--rchat) var(--rchat) 4px var(--rchat); padding: 10px 14px; font-size: 13.5px; font-weight: 500; line-height: 1.45; max-width: 82%; margin-bottom: 2px; }
.bub-brow { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px; }
.bub-b { background: #FFF; border: 1px solid var(--border); border-radius: 4px var(--rchat) var(--rchat) var(--rchat); padding: 10px 13px; font-size: 13.5px; font-weight: 500; color: var(--t1); line-height: 1.5; max-width: calc(100% - 40px); }
.bub-err { background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); border-radius: 4px var(--rchat) var(--rchat) var(--rchat); padding: 10px 13px; font-size: 13px; font-weight: 500; color: #B91C1C; line-height: 1.5; max-width: calc(100% - 40px); }
.cwrap { padding-left: 37px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 2px; }
.chips { padding-left: 37px; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: #FFF; border: 1px solid var(--border); border-radius: 999px; padding: 7px 12px; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--t1); cursor: pointer; transition: border-color .15s,background .15s; white-space: nowrap; }
.chip:active { border-color: var(--accent-mid); background: var(--accent-soft); color: var(--accent); }
.prow { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; margin-bottom: 8px; }
.pchip { display: flex; align-items: center; gap: 9px; background: #FFF; border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--t1); cursor: pointer; text-align: left; }
.pchip:active { border-color: var(--accent-mid); background: var(--accent-soft); }
.picon { color: var(--accent); flex-shrink: 0; display: inline-flex; }
.tyrow { display: flex; align-items: flex-start; gap: 9px; padding: 0 16px 8px; }
.tybub { background: #FFF; border: 1px solid var(--border); border-radius: 4px var(--rchat) var(--rchat) var(--rchat); padding: 12px 16px; display: flex; gap: 4px; align-items: center; }
.tybub span { width: 6px; height: 6px; border-radius: 50%; background: var(--t4); animation: tb 1.2s infinite ease-in-out; display: inline-block; }
.tybub span:nth-child(2){animation-delay:.15s}.tybub span:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0);background:var(--t4)}30%{transform:translateY(-5px);background:var(--accent)}}
.spad { height: 16px; flex-shrink: 0; }
.cfw { background: #FFF; border: 1px solid var(--border); border-radius: var(--rmd); padding: 12px 14px; }
.cfp { font-size: 12.5px; font-weight: 500; color: var(--t2); line-height: 1.5; margin-bottom: 10px; }
.cfbtns { display: flex; gap: 7px; }
.cfbtn { flex: 1; font-family: var(--font); font-size: 12.5px; font-weight: 700; padding: 9px; border-radius: 10px; border: 1px solid var(--border); background: #FFF; color: var(--t1); cursor: pointer; }
.cfbtn.p { background: var(--t1); color: #FFF; border-color: var(--t1); }

/* ── Sticky bottom bar ── */
.bottom-bar {
  flex-shrink: 0;
  background: #FFF;
  border-top: 1px solid var(--bsoft);
  position: relative; z-index: 20;
}
.ibar { padding: 10px 12px 8px; display: flex; align-items: center; gap: 8px; }
.ifield { flex: 1; background: var(--sf2); border: 1px solid var(--border); border-radius: 24px; padding: 11px 16px; font-family: var(--font); font-size: 16px; font-weight: 500; color: var(--t1); outline: none; transition: border-color .15s; -webkit-appearance: none; }
.ifield::placeholder { color: var(--t4); }
.ifield:focus { border-color: var(--accent-mid); }
.sbtn { width: 42px; height: 42px; border-radius: 50%; border: 0; background: var(--accent); color: #FFF; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 2px 8px rgba(243,12,95,.35); }
.sbtn:active { background: #d40a55; transform: scale(.93); }
.scbar { padding: 0 14px calc(var(--safe-bot) + 12px); display: flex; gap: 7px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.scbar::-webkit-scrollbar { display: none; }
.scchip { display: inline-flex; align-items: center; gap: 6px; background: var(--sf2); border: 1.5px solid var(--border); border-radius: 999px; padding: 8px 14px 8px 11px; font-family: var(--font); font-size: 12.5px; font-weight: 700; color: var(--t2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.scchip:active { background: var(--accent-soft); border-color: var(--accent-mid); color: var(--accent); }
.scchip.on { background: var(--t1); border-color: var(--t1); color: #FFF; }
.scchip svg { flex-shrink: 0; }

/* ── Cards ── */
.rc { background: #FFF; border: 1px solid var(--border); border-radius: var(--rmd); display: flex; gap: 10px; align-items: flex-start; padding: 11px 12px; cursor: pointer; }
.rc:active { border-color: var(--accent-mid); }
.rcph { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--sf2); }
.rcph img { width: 100%; height: 100%; object-fit: cover; display: block; }
.rctm { width: 40px; flex-shrink: 0; background: var(--sf2); border-radius: 10px; padding: 7px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; align-self: stretch; }
.rch { font-size: 18px; font-weight: 800; line-height: 1; color: var(--t1); }
.rcm { font-size: 9.5px; font-weight: 600; color: var(--t3); margin-top: 2px; }
.rcb { flex: 1; min-width: 0; }
.rcname { font-size: 13.5px; font-weight: 700; color: var(--t1); line-height: 1.2; letter-spacing: -.2px; }
.rcrole { font-size: 11.5px; font-weight: 500; color: var(--t2); margin-top: 2px; line-height: 1.35; }
.rcmeta { font-size: 11px; font-weight: 500; color: var(--t3); margin-top: 3px; }
.rctag { display: inline-flex; align-items: center; gap: 4px; font-size: 9.5px; font-weight: 700; letter-spacing: .9px; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; margin-bottom: 3px; }
.rctag-l { background: rgba(220,38,38,.10); color: #B91C1C; }
.rctag-n { background: rgba(243,12,95,.10); color: var(--accent); }
.rdot { width: 5px; height: 5px; border-radius: 50%; background: #DC2626; animation: rp 1.4s infinite; display: inline-block; }
@keyframes rp{0%{box-shadow:0 0 0 0 rgba(220,38,38,.6)}70%{box-shadow:0 0 0 5px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.rcmuts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.rcmut { font-size: 10px; font-weight: 600; background: var(--accent-soft); color: var(--accent); padding: 2px 7px; border-radius: 999px; }
.rca { flex-shrink: 0; }
.rcbtn { font-family: var(--font); font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: #FFF; color: var(--t1); cursor: pointer; white-space: nowrap; }
.rcbtn-p { background: var(--t1); color: #FFF; border-color: var(--t1); }
.rcbtn-a { background: var(--accent); color: #FFF; border-color: var(--accent); }

/* ── Peek sheet ── */
.pscrim { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 30; pointer-events: none; transition: background .25s; }
.pscrim.open { background: rgba(0,0,0,.4); pointer-events: all; }
.psheet { position: fixed; bottom: 0; left: 0; right: 0; background: #FFF; border-radius: 24px 24px 0 0; z-index: 31; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); display: flex; flex-direction: column; max-height: 72%; padding-bottom: var(--safe-bot); }
.psheet.open { transform: translateY(0); }
.phandle { width: 36px; height: 4px; border-radius: 999px; background: var(--border); margin: 10px auto 0; flex-shrink: 0; }
.phead { padding: 14px 18px 0; display: flex; align-items: flex-start; gap: 13px; flex-shrink: 0; }
.pph { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--sf2); }
.pph img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pphsq { width: 52px; height: 52px; border-radius: 14px; background: var(--sf2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pinfo { flex: 1; min-width: 0; }
.pname { font-size: 17px; font-weight: 800; letter-spacing: -.5px; line-height: 1.2; color: var(--t1); }
.psub { font-size: 12.5px; font-weight: 500; color: var(--t2); margin-top: 3px; line-height: 1.35; }
.ptags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.ptag { font-size: 10px; font-weight: 600; background: var(--accent-soft); color: var(--accent); padding: 3px 8px; border-radius: 999px; }
.pbody { flex: 1; overflow-y: auto; padding: 14px 18px 0; -webkit-overflow-scrolling: touch; }
.pbody::-webkit-scrollbar { display: none; }
.pr { display: flex; gap: 11px; padding: 9px 0; border-bottom: 1px solid var(--bsoft); align-items: flex-start; }
.pr:last-child { border-bottom: 0; }
.pri { width: 26px; height: 26px; border-radius: 8px; background: var(--sf2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--t2); }
.prl { font-size: 9.5px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }
.prv { font-size: 13px; font-weight: 600; color: var(--t1); }
.prh { font-size: 11px; font-weight: 500; color: var(--t3); margin-top: 2px; }
.pq { padding: 12px 18px 6px; font-size: 13px; font-weight: 600; color: var(--t2); flex-shrink: 0; }
.pact { padding: 10px 16px 16px; display: flex; gap: 8px; flex-shrink: 0; border-top: 1px solid var(--bsoft); }
.pbtn { flex: 1; font-family: var(--font); font-size: 13px; font-weight: 700; padding: 13px; border-radius: 13px; border: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.pbtn:active { opacity: .85; }
.pbtn-p { background: var(--t1); color: #FFF; }
.pbtn-s { background: var(--sf2); color: var(--t1); }
.pbtn-a { background: var(--accent); color: #FFF; }

/* ── Detail page ── */
.dpage { position: fixed; inset: 0; background: #FFF; z-index: 40; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .32s cubic-bezier(.32,.72,0,1); }
.dpage.open { transform: translateX(0); }
.dnav { display: flex; align-items: center; gap: 8px; padding: calc(var(--safe-top) + 10px) 14px 10px; background: #FFF; border-bottom: 1px solid var(--bsoft); flex-shrink: 0; }
.dback { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: #FFF; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--t1); flex-shrink: 0; outline: none; }
.dntitle { flex: 1; font-size: 13px; font-weight: 700; color: var(--t2); }
.dnact { font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--accent); background: transparent; border: 0; cursor: pointer; padding: 4px 8px; }
.dscroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--safe-bot); }
.dscroll::-webkit-scrollbar { display: none; }
.dbanner { width: 100%; height: 200px; position: relative; overflow: hidden; }
.dbbg { position: absolute; inset: 0; }
.dsec { padding: 16px 18px 0; }
.dstitle { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; }
.dcard { background: var(--sf2); border: 1px solid var(--border); border-radius: var(--rmd); padding: 13px 14px; }
.dstats { display: flex; gap: 8px; margin-bottom: 16px; }
.dstat { flex: 1; background: var(--sf2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 10px; text-align: center; }
.dsv { font-size: 20px; font-weight: 800; letter-spacing: -.5px; color: var(--t1); line-height: 1; }
.dsl { font-size: 10px; font-weight: 600; color: var(--t3); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
.dr { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--bsoft); }
.dr:last-child { border-bottom: 0; }
.dri { width: 26px; height: 26px; border-radius: 7px; background: var(--sf2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--t2); }
.drl { font-size: 9.5px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--t3); margin-bottom: 2px; }
.drv { font-size: 13px; font-weight: 600; color: var(--t1); }
.dcta { position: sticky; bottom: 0; background: rgba(255,255,255,.96); backdrop-filter: blur(12px); border-top: 1px solid var(--bsoft); padding: 10px 18px calc(var(--safe-bot) + 10px); display: flex; gap: 8px; }
.spkchip { display: flex; align-items: center; gap: 10px; background: var(--sf2); border-radius: 12px; padding: 10px 12px; cursor: pointer; }
.spkchip:active { background: var(--border); }
.spkchip img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
.spkchip-name { font-size: 13px; font-weight: 700; color: var(--t1); }
.spkchip-role { font-size: 11px; font-weight: 500; color: var(--t2); margin-top: 1px; }
</style>
</head>
<body>

<div class="abar">
  <div class="abar-l">
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M13.5 4.5C13.5 4.5 11 4.5 9 6.5C7 8.5 7 11.5 9 13.5C11 15.5 13.5 15.5 13.5 15.5" stroke="#1A1915" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M10 7C10 7 8.2 7 7 8.5C5.8 10 5.8 12 7 13.5C8.2 15 10 15 10 15" stroke="#1A1915" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="evname">Web Summit</div>
      <div class="evdate">May 12-15 &middot; Expo Tel Aviv</div>
    </div>
  </div>
  <div class="abar-r">
    <button class="ibtn bell" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <div class="ava">JL</div>
  </div>
</div>

<div class="anchor-wrap" id="anchor-wrap"></div>

<div class="cs" id="cs">
  <div class="bdiv">
    <div class="bline"></div>
    <div class="bbadge">
      <div class="bglyph"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z"/></svg></div>
      Bizzy <span class="ldot"></span>
    </div>
    <div class="bline"></div>
    <button class="rbtn" id="rbtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
  </div>
  <div id="chat"></div>
  <div class="spad"></div>
</div>

<div class="bottom-bar">
  <div class="ibar">

function scriptedResponse(query) {
  var q = query.toLowerCase().trim().replace(/[?!.,]/g,'');
  for (var i = 0; i < RESPONSES.length; i++) {
    var entry = RESPONSES[i];
    for (var j = 0; j < entry.match.length; j++) {
      var pattern = entry.match[j].toLowerCase().replace(/[?!.,]/g,'');
      if (q === pattern || q.indexOf(pattern) !== -1 || pattern.indexOf(q) !== -1) {
        return entry.resp;
      }
    }
  }
  // Keyword fallback
  if (q.indexOf('session') !== -1 || q.indexOf('talk') !== -1 || q.indexOf('schedule') !== -1) {
    return {kind:'cards', text:'Here is what is on today:', cards:[{t:'session',title:'Building Sustainable Cities'},{t:'session',title:'AI in Product Design'},{t:'session',title:'Networking Mixer'},{t:'session',title:'Closing Keynote'}], chips:['What is on now?','My agenda','Who should I meet?']};
  }
  if (q.indexOf('meet') !== -1 || q.indexOf('people') !== -1 || q.indexOf('network') !== -1 || q.indexOf('connect') !== -1) {
    return {kind:'cards', text:'Here are the best people to connect with today:', cards:[{t:'person',name:'Alex Chen'},{t:'person',name:'Priya Shah'},{t:'person',name:'Dana Goldberg'},{t:'person',name:'Tom Reyes'}], chips:['Request a meeting with Alex Chen','Who is free right now?','Designers only']};
  }
  if (q.indexOf('speaker') !== -1 || q.indexOf('daniel') !== -1 || q.indexOf('maya') !== -1 || q.indexOf('sarah') !== -1) {
    return {kind:'cards', text:"Today's speakers:", cards:[{t:'speaker',name:'Daniel Wu'},{t:'speaker',name:'Maya Levine'},{t:'speaker',name:'Sarah Chen'}], chips:['Add AI in Product Design to agenda','Where is Hall B?','Who should I meet?']};
  }
  if (q.indexOf('direction') !== -1 || q.indexOf('where') !== -1 || q.indexOf('find') !== -1 || q.indexOf('get to') !== -1) {
    return {kind:'chat', text:'Where are you trying to get to? Hall B, Auditorium A, Main Stage, Level 1, or registration?', chips:['Where is Hall B?','Where is Auditorium A?','Where is registration?']};
  }
  if (q.indexOf('agenda') !== -1 || q.indexOf('saved') !== -1 || q.indexOf('my session') !== -1) {
    return {kind:'cards', text:"Here is what you have saved:", cards:[{t:'session',title:'AI in Product Design'}], chips:['What else should I add?','Sessions I might like','Show full lineup']};
  }
  if (q.indexOf('wifi') !== -1 || q.indexOf('internet') !== -1 || q.indexOf('password') !== -1) {
    return {kind:'chat', text:'WiFi: WebSummit2026 — no password, available throughout the venue.', chips:['Where is Hall B?','What is on now?','My agenda']};
  }
  // Generic fallback
  return {kind:'chat', text:"Good question. Here is what I can help with right now: finding sessions, navigating the venue, connecting with people, or managing your agenda. What do you need?", chips:['What is on now?','Who should I meet?','Where is Hall B?']};
}

function ask(query){
  if(!query||S.typing)return;
  S.thread.push({role:'user',text:query}); S.typing=true; renderChat();
  setTimeout(function(){
    S.typing=false;
    var resp=scriptedResponse(query);
    if(resp.kind==='cards') S.thread.push({role:'bizzy',text:resp.text,cards:resp.cards,chips:resp.chips});
    else if(resp.kind==='confirm') S.thread.push({role:'bizzy',text:resp.text,isConfirm:true,confirmMsg:resp.confirmMsg,confirmYes:resp.confirmYes});
    else S.thread.push({role:'bizzy',text:resp.text,chips:resp.chips||[]});
    renderChat();
  }, 700);
}

    dntitle.textContent='Attendee profile'; na.textContent='Connect';
    na.addEventListener('click',function(){cdAsk('Send a connection request to '+key);});
    dscroll.innerHTML='<div class="dbanner"><div class="dbbg" style="background:linear-gradient(135deg,#1A1915,#2D1A4A)"></div><div style="position:absolute;bottom:0;left:0;right:0;padding:0 18px 16px;display:flex;align-items:flex-end;gap:14px"><div style="width:68px;height:68px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.2);flex-shrink:0"><img src="'+av(key)+'" style="width:100%;height:100%;object-fit:cover"></div><div><div style="font-size:20px;font-weight:800;color:#FFF;letter-spacing:-.5px">'+e(key)+'</div><div style="font-size:13px;font-weight:500;color:rgba(255,255,255,.65);margin-top:3px">'+e(r.role||'')+'&nbsp;&middot;&nbsp;'+e(r.co||'')+'</div></div></div></div>'
      +'<div style="padding:16px 18px 0"><div class="dstats"><div class="dstat"><div class="dsv">'+(r.score?r.score+'%':'--')+'</div><div class="dsl">Match</div></div><div class="dstat"><div class="dsv">'+((r.sessions||[]).length||'--')+'</div><div class="dsl">Sessions</div></div><div class="dstat"><div class="dsv">'+((r.slots||[]).length||'--')+'</div><div class="dsl">Slots</div></div></div></div>'
      +(r.bio?'<div class="dsec"><div class="dstitle">About</div><div class="dcard" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--t2)">'+e(r.bio)+'</div></div>':'')
      +(topics.length?'<div class="dsec"><div class="dstitle">Shared interests</div><div class="dcard"><div style="display:flex;flex-wrap:wrap;gap:6px">'+topics.map(function(t){return '<span style="background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px">'+e(t)+'</span>';}).join('')+'</div></div></div>':'')
      +((r.slots||[]).length?'<div class="dsec"><div class="dstitle">Available meeting slots</div><div class="dcard">'+r.slots.map(function(s){return '<div class="dr"><div class="dri"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="drv">'+e(s)+'</div></div></div>';}).join('')+'</div></div>':'')
      +'<div style="height:90px"></div><div class="dcta"><button class="pbtn pbtn-p" style="flex:2" id="d-meet">Request meeting</button><button class="pbtn pbtn-s" style="flex:1" id="d-msg">Message</button></div>';
    g('d-meet').addEventListener('click',function(){cdAsk('Request a meeting with '+key);});
    g('d-msg').addEventListener('click',function(){cdAsk('Send a message to '+key);});
  } else if(type==='speaker'){
    var rs=SP[key]||{};
    var fk=(rs.followers||0)>1000?Math.round((rs.followers||0)/1000)+'k':(rs.followers||0);
    dntitle.textContent='Speaker profile'; na.textContent='Follow';
    na.addEventListener('click',function(){cdAsk('Follow '+key);});
    dscroll.innerHTML='<div class="dbanner"><div class="dbbg" style="background:linear-gradient(135deg,#1A1915,#0B2D80)"></div><div style="position:absolute;bottom:0;left:0;right:0;padding:0 18px 16px;display:flex;align-items:flex-end;gap:14px"><div style="width:68px;height:68px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.2);flex-shrink:0"><img src="'+av(key)+'" style="width:100%;height:100%;object-fit:cover"></div><div><div style="font-size:20px;font-weight:800;color:#FFF;letter-spacing:-.5px">'+e(key)+'</div><div style="font-size:13px;font-weight:500;color:rgba(255,255,255,.65);margin-top:3px">'+e(rs.title||'')+' at '+e(rs.co||'')+'</div>'+(rs.tw?'<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px">'+e(rs.tw)+'</div>':'')+'</div></div></div>'
      +'<div style="padding:16px 18px 0"><div class="dstats"><div class="dstat"><div class="dsv">'+fk+'</div><div class="dsl">Followers</div></div><div class="dstat"><div class="dsv">'+(rs.talks||'--')+'</div><div class="dsl">Talks</div></div></div></div>'
      +(rs.bio?'<div class="dsec"><div class="dstitle">About</div><div class="dcard" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--t2)">'+e(rs.bio)+'</div></div>':'')
      +(rs.session?'<div class="dsec"><div class="dstitle">Speaking at Web Summit</div><div class="dcard spkchip" id="d-sess"><div style="width:36px;height:36px;border-radius:9px;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div><div class="spkchip-name">'+e(rs.session)+'</div><div class="spkchip-role">'+e(rs.stime||'')+'&nbsp;&middot;&nbsp;Tap to view</div></div></div></div>':'')
      +(rs.talk?'<div class="dsec"><div class="dstitle">Talk preview</div><div class="dcard" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--t2)">'+e(rs.talk)+'</div></div>':'')
      +'<div style="height:90px"></div><div class="dcta"><button class="pbtn pbtn-a" style="flex:2" id="d-fol">Follow speaker</button><button class="pbtn pbtn-s" style="flex:1" id="d-adds">Add session</button></div>';
    if(g('d-sess')&&rs.session){(function(sn){g('d-sess').addEventListener('click',function(){closeDetail();openDetail('session',sn);});})(rs.session);}
    g('d-fol').addEventListener('click',function(){cdAsk('Follow '+key);});
    g('d-adds').addEventListener('click',function(){cdAsk('Add '+(rs.session||'')+' to my agenda');});
  } else if(type==='session'){
    var rse=SS[key]||{},inAg=rse.inAgenda||false;
    var tgrads={'Design & Product':'135deg,#E8F3FF,#C8DCFF','Climate & Society':'135deg,#E8F5EC,#C8E8D0','Networking':'135deg,#FFF0E8,#FFD8C0','Keynote':'135deg,#1A1915,#333'};
    var grad=tgrads[rse.track]||'135deg,#F3EEFF,#E8D8FF',isK=rse.track==='Keynote';
    var tagh2='';
    if(rse.tag==='live') tagh2='<div style="margin-bottom:8px"><span style="display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(220,38,38,.10);color:#B91C1C;padding:4px 10px;border-radius:999px"><span class="rdot"></span>Live now</span></div>';
    else if(rse.tag==='next') tagh2='<div style="margin-bottom:8px"><span style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(243,12,95,.10);color:var(--accent);padding:4px 10px;border-radius:999px">Up next</span></div>';
    dntitle.textContent=rse.track||'Session'; na.textContent=inAg?'Saved':'+ Add'; na.style.color=inAg?'var(--t3)':'var(--accent)';
    na.addEventListener('click',function(){cdAsk((inAg?'Remove ':'Add ')+key+(inAg?' from':' to')+' my agenda');});
    dscroll.innerHTML='<div class="dbanner"><div class="dbbg" style="background:linear-gradient('+grad+')"></div><div style="position:absolute;bottom:0;left:0;right:0;padding:0 18px 16px">'+tagh2+'<div style="font-size:22px;font-weight:800;letter-spacing:-.6px;line-height:1.15;color:'+(isK?'#FFF':'var(--t1)')+'">'+e(key)+'</div><div style="font-size:12.5px;font-weight:500;color:'+(isK?'rgba(255,255,255,.65)':'var(--t2)')+';margin-top:5px">'+e(rse.time||'')+'&nbsp;&middot;&nbsp;'+e(rse.room||'')+'&nbsp;&middot;&nbsp;'+e(rse.dur||'45 min')+'</div></div></div>'
      +'<div style="padding:16px 18px 0"><div class="dstats"><div class="dstat"><div class="dsv">'+(rse.att||'--')+'</div><div class="dsl">Going</div></div><div class="dstat"><div class="dsv">'+(rse.cap||'--')+'</div><div class="dsl">Capacity</div></div>'+(rse.att&&rse.cap?'<div class="dstat" style="background:var(--accent-soft)"><div class="dsv" style="color:var(--accent)">'+Math.round(rse.att/rse.cap*100)+'%</div><div class="dsl" style="color:var(--accent)">Full</div></div>':'')+'</div></div>'
      +(rse.desc?'<div class="dsec"><div class="dstitle">About this session</div><div class="dcard" style="font-size:13px;font-weight:500;line-height:1.6;color:var(--t2)">'+e(rse.desc)+'</div></div>':'')
      +((rse.learn||[]).length?'<div class="dsec"><div class="dstitle">What you will learn</div><div class="dcard">'+rse.learn.map(function(l){return '<div class="dr"><div class="dri" style="color:var(--accent);background:var(--accent-soft)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="drv" style="font-weight:500">'+e(l)+'</div></div></div>';}).join('')+'</div></div>':'')
      +(rse.why?'<div class="dsec"><div class="dstitle">Bizzy says</div><div class="dcard" style="display:flex;gap:10px;align-items:flex-start"><div style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z"/></svg></div><div style="font-size:13px;font-weight:500;line-height:1.55;color:var(--t2)">'+e(rse.why)+'</div></div></div>':'')
      +(rse.spk?'<div class="dsec"><div class="dstitle">Speaker</div><div class="dcard spkchip" id="d-spk"><img src="'+av(rse.spk)+'" alt=""><div><div class="spkchip-name">'+e(rse.spk)+'</div><div class="spkchip-role">Tap to view full profile</div></div></div></div>':'')
      +'<div style="height:90px"></div><div class="dcta"><button class="pbtn '+(inAg?'pbtn-s':'pbtn-a')+'" style="flex:2" id="d-ag">'+(inAg?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> In your agenda':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to agenda')+'</button><button class="pbtn pbtn-s" style="flex:1" id="d-dir">Directions</button></div>';
    g('d-ag').addEventListener('click',function(){cdAsk((inAg?'Remove ':'Add ')+key+(inAg?' from':' to')+' my agenda');});
    g('d-dir').addEventListener('click',function(){cdAsk('How do I get to '+(rse.room||'the venue')+'?');});
    if(g('d-spk')&&rse.spk){(function(sn){g('d-spk').addEventListener('click',function(){closeDetail();openDetail('speaker',sn);});})(rse.spk);}
  }
  g('dpage').classList.add('open'); dscroll.scrollTop=0;
}

// ── Focus/blur: push content up when keyboard opens ──
var inp=g('inp');
inp.addEventListener('focus',function(){
  setTimeout(function(){g('cs').scrollTop=g('cs').scrollHeight;},300);
});

g('dback').addEventListener('click',closeDetail);
g('pscrim').addEventListener('click',closePeek);
g('rbtn').addEventListener('click',function(){S.thread=[];S.asc=null;renderSC();renderChat();});
g('sbtn').addEventListener('click',function(){var v=inp.value.trim();if(!v)return;inp.value='';ask(v);});
inp.addEventListener('keydown',function(ev){if(ev.key==='Enter'){var v=inp.value.trim();if(!v)return;inp.value='';ask(v);}});

renderAnchor(); renderSC(); renderChat();
}());
</script>
</body>
